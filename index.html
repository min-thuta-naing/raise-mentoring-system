<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mentoring Log System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #050510;
        color: white;
      }

      /* Custom Premium Scrollbar - Soft Theme */
      .custom-scrollbar::-webkit-scrollbar {
        width: 8px; /* Slightly thinner for elegance */
      }
      
      .custom-scrollbar::-webkit-scrollbar-track {
        background: #f1f5f9; /* Soft slate-50 background */
        border-radius: 20px;
        margin: 4px 0;
      }
      
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #cbd5e1; /* Soft slate-300 thumb */
        border-radius: 20px;
        border: 2px solid #f1f5f9; /* Padding effect */
        min-height: 40px;
      }
      
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: #94a3b8; /* Slate-400 on hover */
      }

      /* Hide arrows for a cleaner look as per modern UI standards */
      .custom-scrollbar::-webkit-scrollbar-button {
        display: none;
      }

      /* Activity Indicator (Dotted Spinner) */
      .dot-spinner {
        --uib-size: 40px;
        --uib-speed: 0.9s;
        --uib-color: #ffffff;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        height: var(--uib-size);
        width: var(--uib-size);
      }

      .dot-spinner__dot {
        position: absolute;
        top: 0;
        left: 0;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        height: 100%;
        width: 100%;
      }

      .dot-spinner__dot::before {
        content: '';
        height: 20%;
        width: 20%;
        border-radius: 50%;
        background-color: var(--uib-color);
        transform: scale(0);
        opacity: 0.5;
        animation: pulse0112 calc(var(--uib-speed) * 1.111) infinite ease-in-out;
        box-shadow: 0 0 20px rgba(18, 31, 53, 0.3);
      }

      .dot-spinner__dot:nth-child(2) { transform: rotate(45deg); }
      .dot-spinner__dot:nth-child(2)::before { animation-delay: calc(var(--uib-speed) * -0.875); }
      .dot-spinner__dot:nth-child(3) { transform: rotate(90deg); }
      .dot-spinner__dot:nth-child(3)::before { animation-delay: calc(var(--uib-speed) * -0.75); }
      .dot-spinner__dot:nth-child(4) { transform: rotate(135deg); }
      .dot-spinner__dot:nth-child(4)::before { animation-delay: calc(var(--uib-speed) * -0.625); }
      .dot-spinner__dot:nth-child(5) { transform: rotate(180deg); }
      .dot-spinner__dot:nth-child(5)::before { animation-delay: calc(var(--uib-speed) * -0.5); }
      .dot-spinner__dot:nth-child(6) { transform: rotate(225deg); }
      .dot-spinner__dot:nth-child(6)::before { animation-delay: calc(var(--uib-speed) * -0.375); }
      .dot-spinner__dot:nth-child(7) { transform: rotate(270deg); }
      .dot-spinner__dot:nth-child(7)::before { animation-delay: calc(var(--uib-speed) * -0.25); }
      .dot-spinner__dot:nth-child(8) { transform: rotate(315deg); }
      .dot-spinner__dot:nth-child(8)::before { animation-delay: calc(var(--uib-speed) * -0.125); }

      @keyframes pulse0112 {
        0%, 100% { transform: scale(0); opacity: 0.5; }
        50% { transform: scale(1); opacity: 1; }
      }

      /* Animated Pastel Mesh Gradient */
      @keyframes gradient-bg {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }

      .pastel-mesh {
        background: linear-gradient(-45deg, 
          #B2F2BB, /* Mint */
          #E5D9F2, /* Lavender */
          #A7D8DE, /* Sky Blue */
          #FFD8B1  /* Peach */
        );
        background-size: 400% 400%;
        animation: gradient-bg 15s ease infinite;
      }
    </style>
